name: Build & Release APK

# Publishes an installable APK to a GitHub Release whenever a version tag is
# pushed (e.g. v1.0.0). Also runnable manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter test

      - run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk jarvis-${{ github.ref_name }}.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Jarvis ${{ github.ref_name }}
          body: |
            Jarvis Digital Wellbeing Nagger — Android APK.

            Install: open this APK on your phone and allow "install from unknown
            sources". Then grant Usage access + Notifications in the app.

            Debug-signed (personal build). Android only, minSdk 24.
          files: jarvis-${{ github.ref_name }}.apk
